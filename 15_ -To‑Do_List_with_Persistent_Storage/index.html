<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body { font-family: Arial, Helvetica, sans-serif; padding: 30px; min-width: 500px; margin: auto;}
        li {margin: 8px 0;}
        button { margin-left: 10px;}
    </style>
    <title>To‑Do List with Persistent Storage</title>
</head>
<body>
    <h1><i class="fa-solid fa-list-check"></i> To-Do List</h1>
    <input id="task" placeholder="Add task">
    <button onclick="addTask()">Add</button>
    <ul id="list"></ul>
    <script>
        let tasks = JSON.parse(localStorage.getItem("tasks") || "[]");
        const list = document.getElementById("list");
        function render() {
            list.innerHTML = "";
            tasks.forEach((t,i) => {
                list.innerHTML += `<li>${t}
                    <button onclick="removeTask(${i})"><i class="fa-solid fa-trash"></i></button>
                </li>`;
            })
        }
        function addTask() {
            if (task.value.trim() === "") return;
                tasks.push(task.value.trim());
                localStorage.setItem("tasks", JSON.stringify(tasks));
                task.value = "";
           render();
        }
        function removeTask(i) {
            tasks.splice(i,1);
            localStorage.setItem("tasks", JSON.stringify(tasks));
            render();
        } 
        render();
    </script>  
    <script src="script.js"></script>
</body>
</html>
