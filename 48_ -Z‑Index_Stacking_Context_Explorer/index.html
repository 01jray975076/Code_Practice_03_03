<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
          /* 
      Same 2‑column layout as your other playgrounds:
      - Sidebar on the left
      - Preview on the right
    */
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        background: #f5f5f5;
    }
    /* Sidebar styling */
    .sidebar {
        background: #fff;
        border-right: 1px solid #ddd;
        padding: 20px;
        overflow-y: auto;
    }
    h2 {
       margin-top: 0;
       font-size: 18px; 
    }
    .section-title {
        margin-top: 25px;
        font-weight: bold;
        font-size: 15px;
        color: #444;
    }
    /* 
      Controls (sliders, dropdowns) are grouped for clarity
    */
.control-group {
   margin-bottom: 20px; 
}
label {
    font-weight: bold;
    display: block;
    margin-bottom: 6px;
}
input[type="range"], select {
    width: 100%;
}
.value {
    font-size: 14px;
    color: #444;
    margin-top: 4px;
}
/* Preview area */
.preview {
   padding: 20px; 
}
 /* 
      The preview container holds the overlapping boxes.
      It is positioned relative so absolutely positioned children
      can be placed inside it.
    */
    .stage {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        height: 400px;
        position: relative;
        overflow: hidden;
    }
      /* 
      Three overlapping boxes.
      Each box has:
      - a different color
      - absolute positioning
      - a default z-index
    */
.box {
    width: 120px;
    height: 120px;
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    font-weight: bold;
    color: #444;
    transition: all 0.2s ease; 
}
 /* Individual box colors + starting positions */
#box1 {
    background: #e91e63;
    top: 40px;
    left: 40px;
    z-index: 1px;
}
#box2 {
    background: #3f51b5;
    top: 80px;
    left: 100px;
    z-index: 2;
}
#box3 {
   background: #4caf50;
   top: 120px;
   left: 160px;
   z-index: 3; 
}      
    </style>
    <title>Z‑Index + Stacking Context Explorer</title>
</head>
<body>
     <!-- Sidebar with controls -->
      <div class="sidebar">
        <h2>Z-Index & Stacking Context Explorer</h2>
        <div class="section-title">Select Box</div>
        <select id="targetBox">
            <option value="box1">Box 1 (Pink)</option>
            <option value="box2">Box 2 (Blue)</option>
            <option value="box3">Box 3 (Green)</option>
        </select>
        <div class="control-group">
            <label>Z-Index</label>
            <input type="range" id="zIndex" min="-5" max="10" value="1">
            <div class="value" id="zValue">1</div>
        </div>
        <div class="control-group">
             <label>Position</label>
            <select id="position">
                <option value="static">static</option>
                <option value="relative">relative</option>
                <option value="absolute" selected>absolute</option>
            </select>
        </div>
            <div class="control-group">
            <label>Opacity (creates stacking context)</label>
            <input type="range" id="opacity" min="0.1" max="1" step="0.1" value="1">
            <div class="value" id="opacityValue">1</div>
        </div>
        <div class="control-group">
            <label>Transform (creates stacking context)</label>
            <select id="transform">
                <option value="none">none</option>
                <option value="scale(1.1)">scale(1.1)</option>
                <option value="rotate(10deg)">rotate(10deg)</option>
            </select>
        </div>
        <div class="control-group">
            <label>Isolation (forces new stacking context)</label>
            <select id="isolation">
                <option value="auto">auto</option>
                <option value="isolate">isolate</option>
            </select>
        </div>
        </div>
         <!-- Preview area -->
          <div class="preview">
            <h2>Stacking Context Preview</h2>
            <div class="stage" id="stage">
                <div class="box" id="box1">1</div>
                <div class="box" id="box2">2</div>
                <div class="box" id="box3">3</div>
            </div>
         </div> 
    <script>
        // Grab all controls
        const targetBox = document.getElementById("targetBox");
        const zIndex = document.getElementById("zIndex");
        const position = document.getElementById("position");
        const opacity = document.getElementById("opacity");
        const transform = document.getElementById("transform");
        const isolation = document.getElementById("isolation");
        // Value displays
        const zValue = document.getElementById("zValue");
        const opacityValue = document.getElementById("opacityValue");
         // Function to update the selected box
        function updateBox() {
            const box = document.getElementById(targetBox.value);
        // Update z-index
        box.style.zIndex = zIndex.value;
        zValue.textContent = zIndex.value
        // Update position
        box.style.position = position.value;
        // Update opacity (creates stacking context when < 1)
        box.style.opacity = opacity.value;
        opacityValue.textContent = opacity.value;
         // Update transform (also creates stacking context)
         box.style.transform = transform.value;
        // Update isolation on the parent container
            stage.style.isolation = isolation.value;
        }
// Attach the event listeners
targetBox.addEventListener("change", updateBox);
zIndex.addEventListener("input", updateBox);
opacity.addEventListener("input", updateBox);
position.addEventListener("change", updateBox);
transform.addEventListener("change", updateBox);
isolation.addEventListener("change", updateBox);
// Initialize
updateBox();
    </script>
</body>
</html>
