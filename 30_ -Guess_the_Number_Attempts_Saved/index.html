<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body { text-align: center; font-family: Arial; padding: 40px;}
    </style>
    <title>Guess the Number (Attempts Saved)</title>
</head>
<body>
    <h1><i class="fa-solid fa-question"></i> Guess the Number</h1>
    <input type="number" id="g" min="1" max="20">
    <button onclick="guessCheck()">Guess</button>
    <p id="msg"></p>
    <p>Best Attempts: <span id="best">-</span></p>
    <script>
        let secret = Math.ceil(Math.random()*20);
        let attempts = 0;
        let best = JSON.parse(localStorage.getItem("guessBest") || "null");
        const bestEl = document.getElementById("best");
        if (best) bestEl.innerText = best;
        function guessCheck() {
            attempts++;
            let val = Number(g.value);
            if (val === secret) {
                msg.innerText = "Correct!";
                if (!best || attempts < best) {
                    best = attempts; 
                    localStorage.setItem("guessBest", JSON.stringify(best));
                    bestEl.innerText = best;                  
                }
            } else {
                msg.innerText = val < secret ? "Too low" : "Too high"
            }
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
