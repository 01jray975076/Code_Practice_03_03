<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
body {
margin: 0;
font-family: system-ui, sans-serif;
background: #0d1117;
color: #eee;
display: flex;
justify-content: center;
padding-top: 40px;
}
.container {
width: 420px;
background: #161b22;
padding: 24px;
border-radius: 12px;
box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
h1 {
margin-top: 0;
text-align: center; 
color: #58a6ff;
}
.control-group { 
margin-bottom: 16px;
}
label { 
font-weight: bold;
display: block;
margin-bottom: 6px;
}
input[type="range"] {
width: 100%;
}
Select {
width: 100%;
padding: 6px;
border-radius: 6px;
background: #0d1117;
color: #eee;
border: 1px solid #30363d;
}
button {
width: 100%;
padding: 10px;
background: #238636;
border: none;
border-radius: 6px;
color: white;
font-size: 15px;
cursor: pointer;
}
button:hover {
background: #2ea043
}
.stage {
margin-top: 30px;
height: 120px;
background: #0d1117;
border: 1px solid #30363d;
border-radius: 8posr;
overflow: hidden;
}
.box {
width: 50px;
height: 50px;
background: #ff7b72;
border-radius: 6px;
position: absolute;
top: 35px;
left: 0;
}
@keyframes moveAcross {
    from {
        left: 0
    }
    to {
        left: calc(100% - 50px);
    }
} 
.code-output {
    margin-top: 24px;
    background: #0d1117;
    border: 1px solid #30363d;
    padding: 16px;
    border-radius: 8px;
}
.code-output h3 {
margin-top: 0;
color: #58a6ff;
font-size: 16px;
}
#codeBlock {
white-space: pre-wrap;
font-family:"Consolas", monospace;
font-size: 14px;
color: #c9d1d9;
}
    </style>
    <title>CSS Animation Timeline </title>
</head>
<body>
    <div class="container">
        <h1>CSS Animation Timeline Playground</h1>
        <div class="controls">
        <div class="control-group">
            <label>Duration (seconds)</label>
            <input type="range" id="duration" min="0.2" max="5" step="0.1" value="2">
            <span id="durationValue">2s</span>
        </div>    
        <div class="control-group">
            <label>Delay (seconds)</label>
            <input type="range" id="delay" min="0" max="3" step="0.1" value="0">
            <span id="delayValue">0s</span>
        </div>    
        <div class="control-group">
            <label>Easing</label>
            <select id="easing">
                <option value="ease">ease</option>
                <option value="linear">linear</option>
                <option value="ease-in">ease-in</option>
                <option value="ease-out">ease-out</option>
                <option value="ease-in-out">ease-in-out</option>
            </select>
        </div>
        <button id="playBtn">Play Animation</button>
        </div>
        <div class="stage">
            <div class="box" id="box"></div>
        </div>
        <div class="code-output">
            <h3>Generated CSS</h3>
            <pre id="codeBlock"></pre>
        </div>
    </div>
    <script>
const duration = document.getElementById("duration");
const delay = document.getElementById("delay");
const easing = document.getElementById("easing");
const durationValue = document.getElementById("durationValue");
const delayValue = document.getElementById("delayValue");
const playBtn = document.getElementById("playBtn");
const box = document.getElementById("box");
// Update labels
duration.addEventListener("input", () => {
    durationValue.textContent = duration.value + "s";
});
delay.addEventListener("input", () => {
    delayValue.textContent = delay.value + "s";
});
function updateCodeOutput(d, ez, dl) {
    const code = `
    .box {
    animation: moveAcross ${d} ${ez} ${dl} forwards;
    }
    @keyframes moveAcross {
    from { left:0; }
    to { left: calc(100% - 50px); }
    }
    `.trim();
    document.getElementById("codeBlock").textContent = code;
}
// Play animation
playBtn.addEventListener("click", () => {
    const d = duration.value + "s";
    const dl = delay.value + "s";
    const ez = easing.value;
    // Reset animation by removing it
    box.style.animation = "none";
    // Force reflow (restarts animation)
    void box.offsetWidth;
     // Apply new animation
    box.style.animation = `moveAcross ${d} ${ez} ${dl} forwards`;
    updateCodeOutput(d, ez, dl);
});
    </script>
</body>
</html>
