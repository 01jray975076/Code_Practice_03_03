<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body { text-align: center; font-family: Arial, Helvetica, sans-serif; padding: 40px;}
    </style>
    <title>Click Counter Game</title>
</head>
<body>
    <h1><i class="fa-solid fa-mouse"></i> Click Challenge</h1>
    <button id="btn">Click Me!</button>
    <p id="score">0</p>
    <script>
         let clicks = 0;
    let active = false;
    btn.onclick = () => {
        if (!active) {
            active = true;
            clicks=0;
            setTimeout(() => active=false, 10000);
        }
        if (active) {
            clicks++
            score.innerText = clicks;
        }
    } 
    </script>
    <script src="script.js"></script>
</body>
</html>
