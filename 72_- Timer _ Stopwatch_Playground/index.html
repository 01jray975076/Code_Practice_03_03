<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
body { 
margin: 0;
font-family: system-ui, sans-serif;
display: flex;
justify-content: center;
background: #0d1117;
color: #eee;
padding-top: 40px;
}
.container {
width: 360px;
background: #161b22;
padding: 24px;
border-radius: 12px;
box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
h1 {
color: #58a6ff;
text-align: center;
}
#timeDisplay {
font-size: 48px;
text-align: center;
padding: 20px;
background: #0d1117;
border: 1px solid #30363d;
border-radius: 8px;
margin-bottom: 20px;
}
.controls {
display: flex;
gap: 10px;
}
button {
flex: 1px;
padding: 14px;
border: none;
border-radius: 8px;
background: #21263d;
color: #eee;
cursor: pointer;
transition: background 0.2s;
}
button:hover {
background: #30363d;
}
.code-output {
margin-top: 24px;
background: #0d1117;
border: 1px solid #30363d;
padding: 16px;
border-radius: 8px;
}
.code-output h3 {
margin-top: 0;
color: #58a6ff;
}
#codeBlock {
white-space: pre-wrap;
font-family: Consolas, monospace;
font-size: 14px;
color: #c9d1d9;
}
    </style>
    <title> Timer / Stopwatch Playground</title>
</head>
<body>
    <div class="container">
      <h1>Timer / Stopwatch Playground</h1>
      <div id="timeDisplay">00:00.000</div>
      <div class="controls">
        <button id="startStopBtn">Start</button> 
        <button id="resetBtn">Reset</button> 
      </div>
      <div class="code-outlet">
        <h3>Timing Code</h3>
        <pre id="codeBlock"></pre>
      </div> 
    </div>  
    <script>
        const timeDisplay = document.getElementById("timeDisplay");
        const startStopBtn = document.getElementById("startStopBtn");
        const resetBtn = document.getElementById("resetBtn");
        const codeBlock = document.getElementById("codeBlock");
        let startTime = 0;           // When the timer started
        let elapsed = 0;           // Total time accumulated
        let interval = null;           // Interval ID
        let running = false;           // Timer state
        // Format time into mm:ss.mmm
        function formatTime(ms) {
            const minutes = Math.floor(ms / 60000);
            const seconds = Math.floor((ms % 60000) / 1000);
            const millis = ms % 1000;
            return (
                String(minutes).padStart(2, "0") + ":" +
                String(seconds).padStart(2, "0") + "." +
                String(millis).padStart(3, "0") 

            )
        }
        // Update code output panel
        function updateCodeOutput() {
          const code = `
          startTime = Date.now()
          elapsed = Date.now() - startTime
          display = formatTime(elapsed)
          `.trim();
          codeBlock.textContent = code;
        }
        // Start or stop the timer
        startStopBtn.addEventListener("click", () => {
            if (!running) {
                // Start timer
                running = true;
                startStopBtn.textContent = "Stop";
                startTime = Date.now() - elapsed;
                interval = setInterval(() => {
                    elapsed = Date.now() - startTime;
                    timeDisplay.textContent = formatTime(elapsed);
                    updateCodeOutput();
                }, 10);
            } else {
                // Stop timer
                running = false;
                startStopBtn.textContent = "Start";
                clearInterval(interval);
            }
        });
        // Reset timer
        resetBtn.addEventListener("click", () => {
            renning = false;
            clearInterval(interval);
            elasped = 0;
            timeDisplay.textContent = "00:00.000";
            startStopBtn.textContent = "Start";
            updateCodeOutput();
        });
        //Initialize
        updateCodeOutput();
    </script>
</body>
</html>
