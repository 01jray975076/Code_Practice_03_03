<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Weather App Base</title>
</head>
<body>
    <div class="weather-app">
     <!-- Search Section -->
      <div class="search-box">
     <input type="text" id="cityInput" placeholder="Search for a city...">
      <button id="searchBtn">Search</button>
    </div>
    <!-- Weather Display -->
     <div class="weather-card hidden" id="weatherCard">
        <h2 id="cityName">City Name</h2>
        <div class="weather-main">
            <img src="" alt="Weather Icon" id="weatherIcon">
            <h1 id="temperature">--°</h1>
        </div>
        <p id="description">Weather description</p>
        <div class="details">
            <div class="detail">
                <span>Humidity:</span>
                <strong id="humidity">--%</strong>
            </div>
            <div class="detail">
                <span>Wind:</span>
                <strong id="wind">-- mph</strong>
            </div>
        </div>
     </div>
     <!-- Error Message -->
     <p class="error hidden" id="errorMessage">City not found. Try again.</p>
</div>
    <script src="script.js"></script>
</body>
</html>
