<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 20px;
        }
        /* TITLE */
        .title {
            text-align: center;
            margin-bottom: 20px;
        }
        /* SEARCH BAR */
        .search-box {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        #searchInput {
            padding: 10px;
            width: 250px;
            border: 2px solid #ccc;
            border-radius: 6px;
        }
        #searchBtn {
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #searchBtn:hover {
            background: #45a049;
        }
        /* ERROR MESSAGE */
        .error {
            text-align: center;
            color: red;
            margin-top: 10px;
        }
        .hidden {
            display: none;
        }
        /* RECIPE GRID */
        .recipe-grid {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        /* RECIPE CARD */
        .recipe-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .recipe-card img {
            width: 100%;
            border-radius: 6px;
        }
        .recipe-card h3 {
            margin: 10px 0;
        }
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #2196f3;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            cursor: pointer;
        }
        /* MODAL */
        .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        justify-content: center;
        align-items: center;       
        } 
        .modal-content {
            background: white;
            width: 90%;
            max-width: 600px;
            padding: 20px;
            border-radius: 8px;
            overflow-y: auto;
            max-height: 90vh;
        }
        .modal.hidden {
            display: none;
        }
        .close {
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
    </style>
    <title>Recipe_Finder_App</title>
</head>
<body>
    <h1 class="title">Recipe Finder</h1>
    <!-- SEARCH BAR -->
     <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search for a recipe...">
        <button id="searchBtn">Search</button>
     </div>
     <!-- ERROR MESSAGE -->
      <p id="errorMessage" class="error hidden">No recipes found. Try another search.</p>
      <!-- RESULTS GRID -->
       <div id="recipeGrid" class="recipe-grid"></div>
       <!-- MODAL -->
        <div id="modal" class="modal hidden">
            <div class="modal-content">
                <span id="closeModal" class="close">&times;</span>
                <h2 id="modalTitle"></h2>
                <img alt="Recipe Image" id="modalImg">
                <h3>Ingredients</h3>
                <ul id="ingredientList"></ul>
                <h3>Instructions</h3>
                <p id="instructions"></p>
            </div>
        </div>
      <script>
        // DOM ELEMENTS
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        const recipeGrid = document.getElementById("recipeGrid");
        const errorMessage = document.getElementById("errorMessage");
        // Modal elements
        const modal = document.getElementById("modal");
        const closeModal = document.getElementById("closeModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalImg = document.getElementById("modalImg");
        const ingredientList = document.getElementById("ingredientList");
        const instructions = document.getElementById("instructions");
        // Search button click
        searchBtn.addEventListener("click", searchRecipes);
        // Press Enter to search
        searchInput.addEventListener("keypress", (e) => {
            if (e.key === "Enter") searchRecipes();
        });
        // MAIN SEARCH FUNCTION
        async function searchRecipes() {
            const query = searchInput.value.trim();
            if (query === "") return;
            const url = `https://www.themealdb.com/api/json/v1/1/search.php?s=${query}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                if (!data.meals) {
                    showError();
                    return;
                }
                errorMessage.classList.add("hidden");
                recipeGrid.innerHTML = "";
                data.meals.forEach(meal => createRecipeCard(meal));
            } catch (error) {
                showError();
             }
            }
            // CREATE RECIPE CARD
            function createRecipeCard(meal) {
                const card = document.createElement("div");
                card.className = "recipe-card";
                card.innerHTML = `
                <img src="${meal.strMealThumb}" alt="${meal.strMeal}">
                <h3>${meal.strMeal}</h3>
                <p>${meal.strArea} • ${meal.strCategory}</p>
                <button class="btn">View Recipe </button>                
                `;
                card.querySelector(".btn").addEventListener("click", () => openModal(meal));
                    recipeGrid.appendChild(card);
                }
                // OPEN MODAL
                function openModal(meal) {
                    modal.classList.remove("hidden")
                    modalTitle.textContent = meal.strMeal;
                    modalImg.src = meal.strMealThumb;
                    // Build ingredients list
                    ingredientList.innerHTML = "";
                    for (let i = 1; i <= 20; i++) {
                        const ingredient = meal[`strIngredient${i}`];
                        const measure = meal[`strMeasure${i}`];
                        if (ingredient && ingredient.trim() !== "") {
                            const li = document.createElement("li");
                            li.textContent = `${ingredient} - ${measure}`;
                            ingredientList.appendChild(li);
                        }
                    }
                    instructions.textContent = meal.strInstructions;
                }
                // CLOSE MODAL
                closeModal.addEventListener("click", () => {
                    modal.classList.add("hidden");
                });
                // Close modal when clicking outside content
                modal.addEventListener("click", (e) => {
                    if (e.target === modal) {
                        modal.classList.add("hidden");
                    }
                });
                // SHOW ERROR
                function showError() {
                    recipeGrid.innerHTML = "";
                    errorMessage.classList.remove("hidden");
                }      
      </script>
</body>
</html>
