<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Tesla Homepage</title>
</head>
<body>
    <header class="nav">
        <div class="logo">TESLA</div>
        <nav class="nav-links">
            <a href="#">Model S</a>
            <a href="#">Model 3</a>
            <a href="#">Model X</a>
            <a href="#">Model Y</a>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-content">
            <h1>Model Y</h1>
            <p>Order Online for Touchless Delivery</p>
            <div class="hero-buttons">
                <button class="btn-dark">Custom Order</button>
                <button class="btn-light">Existing Inventory</button>
            </div>
        </div>
    </section>
    <section class="models">
        <h2>Explore Models</h2>
        <div class="model-grid">
            <div class="model-card">
                <img src="https://via.placeholder.com/600x350" alt="Model S">
                <h3>Model S</h3>
            </div>
            <div class="model-card">
                <img src="https://via.placeholder.com/600x350" alt="Model 3">
                <h3>Model 3</h3>
            </div>
            <div class="model-card">
                <img src="https://via.placeholder.com/600x350" alt="Model X">
                <h3>Model X</h3>
            </div>
        </div>
    </section>   
    <script src="script.js"></script>
</body>
</html>
