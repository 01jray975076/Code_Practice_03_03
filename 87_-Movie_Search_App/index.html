<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>
    /* Reset */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    /* Title */
    .title {
        text-align: center;
        margin: 30px 0;
        font-size: 2rem;
    }
    /* Search area */
    .search-box {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-bottom: 20px;
       
    }
    #searchInput {
        padding: 10px;
        width: 250px;
         border: 2px solid #ccc;
         border-radius: 6px;
    }
    #searchBtn {
        padding: 10px 20px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
    }
    #searchBtn:hover {
        background: #45a049;
    }
    /* Error message */
    .error {
        text-align: center;
        color: red;
        margin-top: 10px;
    }
    .hidden {
        display: none;
    }
    /* Movie grid */
    .movie-grid {
        max-width: 1000px;
        margin: auto;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 20px;
        padding: 20px;
    }
    /* Movie card */
    .movie-card {
        background: #f4f4f4;
        padding: 10px;
        border-radius: 8px;
        text-align: center;
        box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    .movie-card img {
        width: 100%;
        border-radius: 6px;
    }
    .movie-card h3 {
        margin: 10px 0 5px;
    }
    .movie-card p {
        color: #555;
    }       
   </style>
    <title>Movie Search App</title>
</head>
<body>
    <h1 class="title">Movie Search</h1>
     <!-- SEARCH BAR -->
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search for a movie...">
        <button id="searchBtn">Search</button>
      </div>
    <!-- ERROR MESSAGE -->
     <p id="errorMessage" class="error hidden">No movies found. Try another title.</p>
     <!-- MOVIE RESULTS GRID -->
      <div id="movieGrid" class="movie-grid"></div>
    <script>
        // Select elements
        const searchInput = document.getElementById("searchInput");
        const searchBtn = document.getElementById("searchBtn");
        const movieGrid = document.getElementById("movieGrid");
        const errorMessage = document.getElementById("errorMessage");
        // Your OMDb API Key
        const API_KEY = "a0fb06b5"
        // Search button click
        searchBtn.addEventListener("click", searchMovies);
        // Press Enter to search
        searchInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") searchMovies();
        });
        // Main function: fetch movie data
        async function searchMovies() {
            const query = searchInput.value.trim();
            if (query === "") return;
            const url = `https://www.omdbapi.com/?apikey=${"a0fb06b5"}&s=${query}`;
            try {
                const response = await fetch(url);
                const data = await response.json();
                // If no results
                if (data.Response === "False") {
                    showError();
                    return;
                }
                // Clear previous results
                movieGrid.innerHTML = "";
                 // Hide error
                 errorMessage.classList.add("hidden");
                 // Loop through movie results
                 data.Search.forEach(movie => {
                    const card = document.createElement("div");
                    card.className = "movie-card"
                     // Fallback poster if none exists
                     const poster = movie.Poster !== "N/A"
                     ? movie.Poster
                     : "https://via.placeholder.com/300x450?text=No+Image";
                     card.innerHTML = `
                     <img src="${poster}" alt="${movie.Title}">
                     <h3>${movie.Title}</h3>
                     <p>${movie.Year}</p>
                     `;
                     movieGrid.appendChild(card);
                 });
            } catch (error) {
                showError();
            }
        }
        // Show error message
        function showError() {
            movieGrid.innerHTML = "";
            errorMessage.classList.remove("hidden");
        }
    </script>
</body>
</html>
