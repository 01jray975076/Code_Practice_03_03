<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        #maze { width: 300px;height: 300px; border: 2px solid #000; margin: 40px auto; position: relative; }
        #player { width: 20px; height: 20px; background: blue; position: absolute; }
        #goal { width: 20px; height: 20px; background: gold; position: absolute; right: 0; bottom: 0;}
    </style>
    <title>Mini Maze</title>
</head>
<body>
    <h1><i class="fa-solid fa-map"></i> Mini Maze</h1>
    <div id="maze">
        <div id="player"></div>
        <div id="goal"></div>
    </div>
    <p id="msg"></p>
    <script>
        let x=0, y=0;
        document.onkeydown = e => {
            if (e.key==="ArrowRight" && x<280) x+=10;
            if (e.key==="ArrowLeft" && x>0) x-=10;
            if (e.key==="ArrowDown" && y<280) y+=10;
            if (e.key==="ArrowUp" && y>0) y-=10;
            player.style.left=x+"px";
            player.style.top=y+"px";
            if (x>=280 && y>=280) msg.innerText="You have reached the goal!";
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
