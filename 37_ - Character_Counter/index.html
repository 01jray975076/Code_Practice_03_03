<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
     textarea { width: 300px; height: 150px; padding: 10px; }
     body { text-align: center; font-family: Arial; padding: 40px; }   
    </style>
    <title> Character Counter</title>
</head>
<body>
    <h1><i class="fa-solid fa-font"></i> Character Counter</h1>
    <textarea  id="box"></textarea>
    <p>Characters: <span id="count">0</span></p>
    <script>
        box.value = JSON.parse(localStorage.getItem("charText") || '""');
        count.innerText = box.value.length;
        box.oninput = () => {
            count.innerText = box.value.length;
            localStorage.setItem("charText", JSON.stringify(box.value));
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
