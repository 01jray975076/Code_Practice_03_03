<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body { text-align: center; font-family: Arial, Helvetica, sans-serif; }
        .reels { font-size: 60px; display: flex; justify-content: center; gap: 20px; margin: 40px; }
    </style>
    <title> Simple Slot Machine </title>
</head>
<body>
    <h1><i class="fa-solid fa-coins"></i> Slot Machine</h1>
    <div class="reels">
        <span id="r1">🍒</span>
        <span id="r2">🍋</span>
        <span id="r3">🍉</span>
    </div>
    <button onclick="spin()">Spin</button>
    <p id="msg"></p>
    <script>
        const items = ["🍒","🍋","🍉","⭐","🍇"];
        function spin() {
            let a = items[Math.floor(Math.random()*items.length)];
            let b = items[Math.floor(Math.random()*items.length)];
            let c = items[Math.floor(Math.random()*items.length)];
            r1.innerText = a; r2.innerText = b; r3.innerText = c;
            msg.innerText = (a===b && b===c) ? "JACKPOT!" : "";
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
