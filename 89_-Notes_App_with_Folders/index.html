<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <style>
    /* Layout */
    body {
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f4f4;
        padding: 20px;
    }
    .title {
        text-align: center;
        margin-bottom: 20px;
    }
    .container {
        display: flex;
        gap: 20px;
    }
    /* Sidebar */
    .sidebar {
    width: 200px;
    background: white;
    padding: 15px;
    border-radius: 8px;
    }
    .sidebar ul {
        list-style: none;
        margin-bottom: 15px;
    }
    .sidebar li {
        padding: 8px;
        background: #eee;
        margin-bottom: 5px;
        border-radius: 6px;
        cursor: pointer;
    }
    .sidebar li.active {
        background: #4caf50;
        color: white
    }
    /* Notes area */
    .notes-area {
        flex: 1;
        background:white;
        padding: 15px;
        border-radius: 8px;
        }
        #noteInput {
            width: 100%;
            height: 400px;
            padding: 10px;
            border-radius: 6px;
        }
   </style>
    <title>Notes App with Folders</title>
</head>
<body>
    <h1 class="title">Notes App</h1>
    <div class="container">
      <!-- LEFT SIDEBAR: Folders -->
       <div class="sidebar">
        <h2>Folders</h2>
        <ul id="folderList"></ul>
        <input type="text" id="newFolderInput" placeholder="New folder name">
        <button id="addFolderBtn">Add Folder</button>
       </div>
       <!-- RIGHT SIDE: Notes -->
        <div class="notes-area">
             <h2 id="currentFolderTitle">Select a folder</h2>
             <textarea id="noteInput" placeholder="Write your notes here..." disable></textarea>
        </div>  
    </div>  
    <script>
        // DOM elements
        const folderList = document.getElementById("folderList");
        const newFolderInput = document.getElementById("newFolderInput");
        const addFolderBtn = document.getElementById("addFolderBtn");
        const noteInput = document.getElementById("noteInput");
        const currentFolderTitle = document.getElementById("currentFolderTitle");
        // App data stored in localStorage
        let folders = JSON.parse(localStorage.getItem("folders")) || {};
        let activeFolder = null;
        // Save to localStorage
        function saveData() {
            localStorage.setItem("folders", JSON.stringify(folders));
        }
        // Render folder list
        function renderFolders() {
            folderList.innerHTML = "";
            Object.keys(folders).forEach(folderName => {
                const li = document.createElement("li");
                li.textContent = folderName;
                if (folderName === activeFolder) {
                    li.classList.add("active");
                } 
                li.addEventListener("click", () => {
                    activeFolder = folderName;
                    currentFolderTitle.textContent = folderName;
                    noteInput.disabled = false;
                    noteInput.value = folders[folderName];
                    renderFolders();
                });
                folderList.appendChild(li);
            });
        }
        // Add new folder
        addFolderBtn.addEventListener("click", () => {
            const name = newFolderInput.value.trim();
            if (!name || folders[name]) return;
            folders[name] = "";
            activeFolder = name;
            newFolderInput.value = "";
            saveData();
            renderFolders(); 
        });
        // Save notes as user types
        noteInput.addEventListener("input", () => {
            if (!activeFolder) return;
            folders[activeFolder] = noteInput.value;
            saveData();
        });
        // Initial render
        renderFolders();
    </script>
</body>
</html>
