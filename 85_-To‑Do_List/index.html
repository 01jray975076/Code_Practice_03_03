<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; 
        }
        /* Page title */
        .title {
            text-align: center;
            margin: 30px 0;
            font-size: 2rem;
        }
        /* Input area */
        .todo-input {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        #taskInput {
            width: 250px;
            padding: 10px;
            border: 2px solid #ccc;
            border-radius: 6px;
        }
        #addBtn {
            padding: 10px 20px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        #addBtn:hover {
            background: #45a049;
        }
       /* Task list */
       #taskList {
        max-width: 400px;
        margin: auto;
        list-style: none;
       } 
       /* Each task item */
       .task {
        background: #f4f4f4;
        padding: 12px;
        margin-bottom: 10px;
        border-radius: 6px;
        display: flex;
        justify-content: center;
        align-items: center;
       }
       /* Completed task style */
       .completed {
        text-decoration: line-through;
        opacity: 0.6;
       }
      /* Delete button */
      .deleteBtn {
      background: red;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;      
        }
        .delete:hover {
            background: darkred;
        }
    </style>
    <title>To-Do List </title>
</head>
<body>
    <h1 class="title">To-Do List</h1>
     <!-- INPUT AREA -->
      <div class="todo-input">
        <input type="text" id="taskInput" placeholder="Enter a new task...">
        <button id="addBtn">Add</button>
      </div>
    <!-- TASK LIST -->
     <ul id="taskList"></ul>
    <script>
        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addBtn");
        const taskList = document.getElementById("taskList");
        // Load tasks from localStorage when page loads
        document.addEventListener("DOMContentLoaded", loadTasks);
        // Add task when clicking the button
        addBtn.addEventListener("click", addTask);
        // Add task when pressing Enter
        taskInput.addEventListener("keypress", function(e) {
            if (e.key === "Enter") addTask();
        });
        // Function: Add a new task
        function addTask() {
            const taskText = taskInput.value.trim();
            if (taskText === "") return; // Ignore empty input
             // Create task object
             const task = {
                text: taskText,
                completed: false
             };
              // Add to UI
              addTaskToUI(task);
              // Save to localStorage
              saveTask(task);
               // Clear input
               taskInput.value = "";
        }
        // Function: Add task to UI
        function addTaskToUI(task) {
            const li = document.createElement("li");
            li.className = "task";
         // Apply completed style if needed
         if (task.completed) li.classList.add("completed");
         li.innerHTML = `
         <span class="taskText">${task.text}</span>
         <button class="deleteBtn">X</button>
         `;
         // Toggle complete on click
         li.addEventListener("click", function(e) {
            if (e.target.classList.contains("deleteBtn")) return;
            li.classList.toggle("completed");
            updateLocalStorage();
         });
         // Delete task
         li.querySelector(".deleteBtn").addEventListener("click", function() {
            li.remove();
            updateLocalStorage();
         });
         taskList.appendChild(li);
        }
        // Function: Save task to localStorage
        function saveTask(task) {
            const tasks = getTasks();
            tasks.push(task);
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }
        // Function: Get tasks from localStorage
        function getTasks() {
            return JSON.parse(localStorage.getItem("tasks")) || [];
        }
        // Function: Load tasks on page load
        function loadTasks() {
            const tasks = getTasks();
            tasks.forEach(task => addTaskToUI(task));
        }
        // Function: Update localStorage after changes
        function updateLocalStorage() {
            const tasks = [];
            document.querySelectorAll(".task").forEach(li => {
                tasks.push({
                    text: li.querySelector(".taskText").innerText,
                    completed: li.classList.contains("completed")
                });
            });
            localStorage.setItem("tasks", JSON.stringify(tasks));
        }
    </script>
</body>
</html>
