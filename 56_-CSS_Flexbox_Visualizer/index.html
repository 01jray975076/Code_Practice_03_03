<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
    /* 
      Same 2-column layout as your other playgrounds:
      - Sidebar: controls
      - Preview: flex container
    */
     body { 
        margin: 0;
        font-family: system-ui, sans-serif;
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        background: #f5f5f5;
}
/* Sidebar styling */
.sidebar { 
    background: #fff;
    border-right: 1px solid #ddd;
    padding: 20px;
    overflow-y: auto;
}
h2 {
 margin-top: 0;
 font-size: 18px;
}
.control-group { 
margin-bottom: 20px;
}
label { 
font-weight: bold;
display: block;
margin-bottom: 6px;
}
input[type="range"],
select  {
width: 100%;
padding: 6px;
font-size: 14px;
border-radius: 6px;
border: 1px solid #ccc;
box-sizing: border-box;
}
.value { 
    font-size: 13px;
    color: #444;
    margin-top: 4px;
}
/* Preview area */
.preview { 
padding: 20px;
 }
 /*
    The flex container.
    All flex properties will be applied here.
    */
    .flex-box {
background: #fff;
border: 1px solid #ddd;
border-radius: 10px;
padding: 20px;
min-height: 400px;
display: flex;
gap: 10;
transition: all 0.2s ease;
}
/* Flex items */
    .item {
background: #fff;
border: 1px solid #ddd;
font-weight: bold;
font-size: 18px;
border-radius: 8px;
display: flex;
justify-content: center;
align-items: center;
padding: 20px;
min-width: 60px;
min-height: 60px;
}
    </style>
    <title>CSS Flexbox Visualizer </title>
</head>
<body>
    <!-- Sidebar -->
     <div class="sidebar">
        <h2>CSS Flexbox Visualizer</h2>
        <!-- FLEX DIRECTION -->
         <div class="control-group">
            <label>flex-direction</label>
            <select id="directionSelect">
                <option value="row">row</option>
                <option value="row-reverse">row-reverse</option>
                <option value="column">column</option>
                <option value="column-reverse">column-reverse</option>
            </select>
         </div>
         <!-- FLEX WRAP -->
         <div class="control-group">
            <label>flex-wrap</label>
            <select id="wrapSelect">
                <option value="nowrap">nowrap</option>
                <option value="wrap">wrap</option>
                <option value="wrap-reverse">wrap-reverse</option>
            </select>
         </div>
         <!-- JUSTIFY CONTENT -->
         <div class="control-group">
            <label>justify-content</label>
            <select id="justifyContent">
                <option value="flex-start">flex-start</option>
                <option value="center">center</option>
                <option value="flex-end">flex-end</option>
                <option value="space-between">space-between</option>
                <option value="space-around">space-around</option>
                <option value="space-evenly">space-evenly</option>
            </select>
         </div>
         <!-- ALIGN ITEMS -->
         <div class="control-group">
            <label>align-items</label>
            <select id="alignItems">
                <option value="stretch">stretch</option>
                <option value="flex-start">flex-start</option>
                <option value="center">center</option>
                <option value="flex-end">flex-end</option>
            </select>
         </div> 
         <!-- ALIGN CONTENT -->
         <div class="control-group">
            <label>align-content (only works with wrap)</label>
            <select id="alignContent">
                <option value="stretch">stretch</option>
                <option value="flex-start">flex-start</option>
                <option value="center">center</option>
                <option value="flex-end">flex-end</option>
                <option value="space-between">space-between</option>
                <option value="space-around">space-around</option>
                <option value="space-evenly">space-evenly</option>
            </select>
         </div>
         <!-- GAP -->
         <div class="control-group">
            <label>Gap (px)</label>
            <input type="range" id="gapSlider" min="0" max="40" value="10">
            <div class="value" id="gapValue">10px</div>
         </div>
     </div>
     <!-- Preview -->
      <div class="preview">
        <h2>Flexbox Preview</h2>
        <div class="flex-box" id="flexBox">
            <div class="item">A</div>
            <div class="item">B</div>
            <div class="item">C</div>
            <div class="item">D</div>
            <div class="item">E</div>
            <div class="item">F</div>
        </div>
      </div> 
    <script>
        // Grab elements
        const flexBox = document.getElementById("flexBox");
        constdirectionSelect = document.getElementById("directionSelect");
        const wrapSelect = document.getElementById("wrapSelect");
        const justifyContent = document.getElementById("justifyContent");        
        const alignItems = document.getElementById("alignItems");
        const alignContent = document.getElementById("alignContent");
        const gapSlider = document.getElementById("gapSlider");
        const gapValue = document.getElementById("gapValue");
        // Update function
        function updateFlex() {
            flexBox.style.flexDirection = directionSelect.value;
            flexBox.style.flexWrap = wrapSelect.value;
            flexBox.style.justifyContent = justifyContent.value;
            flexBox.style.alignItems = alignItems.value;
            flexBox.style.alignContent = alignContent.value;
            flexBox.style.gap = gapSlider.value + "px";
           gapValue.textContent = gapSlider.value + "px";            
        }
        // Attach listeners
        directionSelect.addEventListener("change", updateFlex);
        wrapSelect.addEventListener("change", updateFlex);
       justifyContent.addEventListener("change", updateFlex);
       alignItems.addEventListener("change", updateFlex);
       alignContent.addEventListener("change", updateFlex);
       gapSlider.addEventListener("input", updateFlex);
       // Initialize
       updateFlex();
    </script>
</body>
</html>
