<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
        body {
        margin: 0;
        font-family: system-ui, sans-serif;
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        background: #f5f5f5;
    }
    /* Sidebar */
    .sidebar {
        background: #fff;
        border-right: 1px solid #ddd;
        padding: 20px;
        overflow-y: auto;
    }
    h2 {
        margin-top: 0;
        font-size: 18px;
    }
    .control-group {
        margin-bottom: 20px;
    }
    label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
    }
    input[type="range"] {
        width: 100%;
    }
    .value {
        font-size: 14px;
        color: #444;
        margin-top: 4px;
    }
    /* Preview */
    .preview {
        padding: 20px;
    }
    .box-wrapper {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 20px;
        min-height: 350px;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .box {
        background: #ffb3c1;
        border: 1px solid #c2185b;
        width: 150px;
        height: 150px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        transition: all 0.15s ease;
    }
    </style>   
    <title>CSS Box Model Visualizer</title>
</head>
<body>
   <!-- Sidebar -->
    <div class="sidebar">
        <h2>Box Model Visualizer</h2>
        <div class="control-group">
            <label>Margin</label>
            <input type="range" id="margin" min="0" max="100" value="20">
            <div class="value" id="marginValue">20px</div>
        </div> 
        <div class="control-group">
            <label>Border Width</label>
            <input type="range" id="border" min="0" max="30" value="2">
            <div class="value" id="borderValue">2</div>
        </div>
        <div class="control-group">
            <label>Padding</label>
            <input type="range" id="padding" min="0" max="60" value="10">
            <div class="value" id="paddingValue">10px</div>
        </div>
        <div class="control-group">
            <label>Content Size</label>
            <input type="range" id="content" min="50" max="300" value="150">
            <div class="value" id="contentValue">150px</div>
        </div>
    </div>
    <!-- Preview -->
     <div class="preview">
        <h2>Box Model Preview</h2>
        <div class="box-wrapper">
            <div class="box" id="box">BOX</div>
        </div>
     </div>
     <script>
        const box = document.getElementById("box");
        const margin = document.getElementById("margin");
        const border = document.getElementById("border");
        const padding = document.getElementById("padding");
        const content = document.getElementById("content");
        const marginValue = document.getElementById("marginValue");
        const borderValue = document.getElementById("borderValue");
        const paddingValue = document.getElementById("paddingValue");
        const contentValue = document.getElementById("contentValue");
        function updateBoxModel() {
            box.style.margin = margin.value + "px";
            box.style.borderWidth = border.value + "px";
            box.style.padding = padding.value + "px";
            box.style.width = content.value + "px";
            box.style.height = content.value + "px";
            marginValue.textContent = margin.value + "px";
            borderValue.textContent = border.value + "px";
            paddingValue.textContent = padding.value + "px";
            paddingValue.textContent = padding.value + "px";
           contentValue.textContent = content.value + "px";
        }
        margin.addEventListener("input", updateBoxModel);
        border.addEventListener("input", updateBoxModel);
        padding.addEventListener("input", updateBoxModel);
        content.addEventListener("input", updateBoxModel);
        updateBoxModel();
     </script>
    <script src="script.js"></script>
</body>
</html>
