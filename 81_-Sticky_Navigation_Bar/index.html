<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset default spacing */
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
}
/* Global styles */
body {
    font-family: Arial, sans-serif;
}
/* NAVIGATION BAR */
nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    position: sticky; /* Sticks to top when scrolling */
    top: 0;
    background: transparent;
    transition: background 0.3s ease, padding 0.3 ease;
    z-index: 1000;   /* Keeps nav above other content */
}
/* Nav links */
nav ul {
    display: flex;
    gap: 20px;
   
}
nav a {
    text-decoration: none;
    color: black;
    font-weight: bold;
}
/* CLASS ADDED WHEN SCROLLING */
nav.scrolled {
    background: #333;  /* Dark background when scrolled */
    padding: 10px 20px;  /* Slightly smaller padding */ 
}
nav.scrolled a {
    color: white;  /* White text when scrolled */
}
/* SECTION STYLES */
.section {
    padding: 100px 20px;
    min-height: 100vh;   /* Each section fills the screen */   
}
/* HERO SECTION */
.hero {
    background: linear-gradient(to right, #4caf50, #2e7d32);
    color: white;
    text-align: center;
}
    </style>
    <title>Sticky Navigation Bar</title>
</head>
<body>
     <!-- NAVIGATION BAR -->
     <nav id="navbar">
        <h1 class="logo">MySites</h1>
        <ul class="nav-links">
         <!-- Clicking these scrolls to sections -->
            <li><a href="#home">Home</a></li>        
            <li><a href="#features">Features</a></li>        
            <li><a href="#info">Info</a></li>      
            </ul>
     </nav>
     <!-- HERO SECTION -->
<section id="home" class="section hero">
    <h2>Welcome</h2>
    <p>Scroll down to see the sticky nav in action.</p>
</section>
<!-- FEATURES SECTION -->
<section id="features" class="section">
    <h2>Features</h2>
    <p>This section demonsrates smooth scrolling and sticky behavior.</p>
</section>
<!-- INFO SECTION -->
<section id="info" class="section">
<h2>More Info</h2>
<p>As you scrool, the navigation bar changes style</p>
</section>
    <script>
        // Select the navigation bar
        const navbar = document.getElementById("navbar");
        // Listen for scroll events on the window
        window.addEventListener("scroll", () => {
          // If the page is scrolled down more than 50px...
            if (window.scrollY > 50) {
             // Add the "scrolled" class (changes background + padding)
                navbar.classList.add("scrolled");
            } else {
              // Remove the class when back at the top
              navbar.classList.remove("scrolled")  
            }  
        });
        // Smooth scrolling for nav links
        const links = document.querySelectorAll('a[href^="#"]');
        links.forEach(link => {
        link.addEventListener("click", function(e) {
            e.preventDefault(); // Prevent instant jump
            const target = document.querySelector(this.getAttribute("href"));
            // Smooth scroll to section
            target.scrollIntoView({
                behavior: "smooth",
                block: "start"
                });
            });
        });
    </script>
</body>
</html>
