<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .grid { display:grid; grid-template-columns: repeat(2,120px); gap: 20px;margin: 40px auto; }
        .card { width: 120px; height: 120px; background:#555; color:white; display: flex; justify-content: center;align-items: center; font-size: 40px; cursor: pointer; }
        body{ text-align: center; font-family: Arial, Helvetica, sans-serif; }
    </style>
    <title>Memory Match Best Score</title>
</head>
<body>
    <h1><i class="fa-solid fa-brain"></i> Memory Match</h1>
    <p>Moves: <span id="moves">0</span></p>
    <p>Best: <span id="best">-</span></p>
    <div class="grid">
    <div class="card" data-v="🍎"></div>
    <div class="card" data-v="🍌"></div>
    <div class="card" data-v="🍎"></div>
    <div class="card" data-v="🍌"></div>
    </div>
    <script>
       let flipped = [];
       let movesCount = 0;
       const bestEl = document.getElementById("best");
       let best = JSON.parse(localStorage.getItem("bestMemory") || "null");
       if (best) bestEl.innerText = best;
       document.querySelectorAll(".card").forEach(card => {
        card.onclick = () => {
            if (flipped.length < 2 && !card.classList.contains("open")) {
                card.innerText = card.dataset.v;
                card.classList.add("open");
                flipped.push(card);
                if (flipped.length === 2) {
                    movesCount++;
                    moves.innerText = movesCount;
                    setTimeout(() => {
                        if (flipped[0].dataset.v !== flipped[1].dataset.v) {
                            flipped.forEach(c => { c.innerText=""; c.classList.remove("open"); });
                        } else {
                            if (document.querySelectorAll(".open").length === 4) {
                                if (!best || movesCount < best) {
                                    best = movesCount;
                                    localStorage.setItem("bestMemory", JSON.stringify(best));
                                    bestEl.innerText = best;
                                }
                            }
                        }
                        flipped = [];
                    }, 800);
                }
            }
        };
       });
    </script>    
    <script src="script.js"></script>
</body>
</html>
