<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        #box {width: 300px; height: 300px; background: #ddd; margin: 40px auto; position: absolute; }
        #target { width: 40px; height: 40px; background: red; border-radius: 50%; position: absolute; cursor: pointer; }
        body { text-align:center; font-family: Arial; }

    </style>
    <title>Click‑the‑Target (Best Time Saved)</title>
</head>
<body>
    <h1><i class="fa-solid fa-bullseye"></i> Click the Target</h1>
    <p>Best Time: <span id="best">-</span> ms</p>
    <div id="box"><div id="target"></div></div>
    <script>
        let start;
        let best = JSON.parse(localStorage.getItem("targetBest") || "null");
        const bestEl = document.getElementById("best");
        if (best) bestEl.innerText = best;
        function moveTarget() {
            target.style.left = Math.random()*260 + "px";
            target.style.top = Math.random()*260 + "px";
            start = Date.now();
        }
        target.onclick = () => {
            let t = Date.now() - start;
            if (!best || t < best) {
                best = t;
                localStorage.setItem("targetBest", JSON.stringify(best));
                bestEl.innerText = best;
            }
            moveTarget();
        };
        moveTarget();
    </script>  
    <script src="script.js"></script>
</body>
</html>
