<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        #maze { width: 300px; height: 300px; border: 2px solid #000; margin: 40px auto; position: relative;}
        #player { width: 20px; height: 20px; background: blue; position: absolute; }
        #goal { width: 20px; height: 20px; background: gold; position: absolute; right: 0; bottom: 0; }
        body { text-align: center; font-family: Arial; }
    </style>
    <title>Maze Timer (Best Completion Time Saved)</title>
</head>
<body>
    <h1><i class="fa-solid fa-map"></i> Maze Timer</h1>
    <p>Best Time: <span id="best">-</span> ms</p>
    <div id="maze">
        <div id="player"></div>
        <div id="goal"></div>
    </div>
    <script>
        let x = 0, y=0;
        let start = Date.now();
        let best = JSON.parse(localStorage.getItem("mazeBest") || "null");
       const bestEl = document.getElementById("best");
        if (best) bestEl.innerText = best;
        document.onkeydown = e => {
            if (e.key==="ArrowRight" && x<280) x+=10;
            if (e.key==="ArrowLeft" && x>0) x-=10;
            if (e.key==="ArrowDown" && y<280) y+=10;
            if (e.key==="ArrowUp" && y>0) y-=10;
            player.style.left=x+"px";
            player.style.top=y+"px";
            if (x>=280 && y >=280) {
                let timeEl = Date.now() - start;
                if (!best || timeEl < best) {
                    best = timeEl;
                    localStorage.setItem("mazeBest", JSON.stringify(best));
                    bestEl.innerText = best; 
                }
            }
        };
    </script>
    <script src="script.js"></script>
</body>
</html>
