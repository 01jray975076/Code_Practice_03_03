<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
      body { font-family: Arial, sans-serif; padding: 40px; max-width: 600px; margin: auto; text-align: center;}  
      #preview { width: 100%;height: 150px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #fff; font-weight: bold; }
      .row { margin: 20px; text-align-last: left; }
      input[type="range"] { width: 100%; }
      label { font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
    <title>HEX + Alpha Color Mixer</title>
</head>
<body>
    <h1><i class="fa-solid fa-hashtag"> HEX + Alpha Mixer</i></h1>
    <p>Adjust RGB + Alpha to generate an 8-digit HEX color:</p>
    <div id="preview">#FF634780</div>
    <div class="row">
        <label>RED: <span id="rVal">255</span></label>
        <input type="range" id="r" min="0" max="255" value="255">
    </div>
    <div class="row">
        <label>GREEN: <span id="gVal">99</span></label>
        <input type="range" id="g" min="0" max="255" value="99">
    </div>
    <div class="row">
        <label>BLUE: <span id="bVal">71</span></label>
        <input type="range" id="b" min="0" max="255" value="71">
    </div>
    <div class="row">
        <label>ALPHA: <span id="aVal">0.5</span></label>
        <input type="range" id="a" min="0" max="1" step="0.01" value="0.5">
    </div>  
    <script>
        const r = document.getElementById("r");
        const g = document.getElementById("g");
        const b = document.getElementById("b");
        const a = document.getElementById("a");
        const rVal = document.getElementById("rVal");
        const gVal = document.getElementById("gVal");
        const bVal = document.getElementById("bVal");
        const aVal = document.getElementById("aVal");
        const preview = document.getElementById("preview");
        function toHex(v) {
            let h = Number(v).toString(16).toUpperCase();
            return h.length === 1 ? "0" + h : h;
        }
        function update() {
            const alphaHex = toHex(Math.round(a.value * 255));
            const hex = 
            "#" + 
            toHex(r.value) +
            toHex(g.value) +
            toHex(b.value) +
            alphaHex;
            rVal.innerText = r.value;
            gVal.innerText = g.value;
            bVal.innerText = b.value;
            aVal.innerText = a.value;
            preview.style.background = hex;
            preview.innerText = hex;
        }
        r.oninput = g.oninput = b.oninput = a.oninput = update;
        update();
    </script>
    <script src="script.js"></script>
</body>
</html>
