<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
         /* 
      Same 2-column layout as your other playgrounds:
      - Sidebar on the left
      - Preview on the right
    */
    body {
        margin: 0;
        font-family: system ui, sans-serif;
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        background: #f5f5f5;
    }
    /* Sidebar styling */
    .sidebar {
      background: #fff;
      border-right: 1px solid #ddd;
      padding: 20px;
      overflow-y: auto;  
    }
    h2 {
        margin-top: 0;
        font-size: 18px;
    }
    .section-title {
        margin-top: 25px;
        font-weight: bold;
        font-size: 15px;
        color: #444;
    }
    /* Group controls for spacing and clarity */
    .control-group {
        margin-bottom: 20px;
    }
    label {
        font-weight: bold;
        display: block;
        margin-bottom: 6px;
    }
    input[type="range"], select {
        width: 100px;
    }
    .value {
     font-size: 14px;
     color: #444;
     margin-top: 4px;   
    }
    /* Preview area */
    .preview {
        padding: 20px;
    }
     /* 
      The text box we will modify.
      It has padding and a border so spacing changes are visible.
    */
    .text-box {
     background: #fff;
     border: 1px solid #ddd;
     border-radius: 8px;
     padding: 20px;
     min-height: 300px;
     font-size: 20px; /* Default size */
     line-height: 1.4; /* Default line height */
     transition: all 0.15s ease;  
    }
    </style>
    <title>Typography & Text Rendering</title>
</head>
<body>
    <!-- Sidebar with controls -->
     <div class="sidebar">
        <h2>Typography Playground</h2>
         <!-- FONT SIZE -->
          <div class="control-group">
            <label>Font Size</label>
            <input type="range" id="fontSize" min="10" max="60" value="20">
            <div class="value" id="fontSizeValue">20px</div>
          </div>
    <!-- FONT WEIGHT -->
     <div class="control-group">
        <label>Font Weight</label>
        <select id="fontWeight">
            <option value="300">300 (Light)</option>
            <option value="400" selected>400 (Normal)</option>
            <option value="500">500 (Medium)</option>
            <option value="600">600 (Semi-bold)</option>
            <option value="700">700 (Bold)</option>
            <option value="900">900 (Black)</option>
        </select>
     </div>
     <!-- LINE HEIGHT -->
      <div class="control-group">
        <label>Line Height</label>
        <input type="range" id="lineHeight" min="1" max="3" step="0.1" value="1.4">
        <div class="value" id="lineHeightValue">1.4</div>
      </div>
      <!-- LETTER SPACING -->
      <div class="control-group">
        <label>Letter Spacing</label>
        <input type="range" id="letterSpacing" min="-5" max="20" value="0">
        <div class="value" id="letterSpacingValue">0px</div>
      </div>
      <!-- WORD SPACING -->
      <div class="control-group">
        <label>Word Spacing</label>
        <input type="range" id="wordSpacing" min="-10" max="40" value="0">
        <div class="value" id="wordSpacingValue">0px</div>
      </div> 
      <!-- TEXT ALIGN -->
      <div class="control-group">
        <label>Text Align</label>
        <select id="textAlign">
            <option value="left" selected>left</option>
            <option value="center">center</option>
            <option value="right">right</option>
            <option value="justify">justify</option>
        </select>
      </div>
      <!-- TEXT TRANSFORM -->
      <div class="control-group">
        <label>Text Transform</label>
        <select id="textTransform">
            <option value="none" selected>none</option>
            <option value="uppercase">uppercase</option>
            <option value="lowercase">lowercase</option>
            <option value="capitalize">capitalize</option>
        </select>
      </div>
      <!-- FONT FAMILY -->
      <div class="control-group">
        <label>Font Family</label>
        <select id="fontFamily">
            <option value="system-ui" selected>system-ui</option>
            <option value="serif">serif</option>
            <option value="sans-serif">sans-serif</option>
            <option value="monospace">monospace</option>
            <option value="cursive">cursive</option>
        </select>
      </div>
     </div>
     <!-- Preview area -->
      <div class="preview">
        <h2>Typography Preview</h2>
        <div class="text-box" id="textBox">
          Typography is the art of arranging text.  
      Adjust the sliders and dropdowns to see how each property affects readability, spacing, and visual rhythm.
        </div>
      </div>
    <script>
        // Grab the preview text box
        const textBox = document.getElementById("textBox");
        // Grab all controls
        const fontSize = document.getElementById("fontSize");
        const fontWeight = document.getElementById("fontWeight");
        const lineHeight = document.getElementById("lineHeight");
        const letterSpacing = document.getElementById("letterSpacing");
        const wordSpacing = document.getElementById("wordSpacing");
        const textAlign = document.getElementById("textAlign");
        const textTransform = document.getElementById("textTransform");
        const fontFamily = document.getElementById("fontFamily");
        // Value displays
        const fontSizeValue = document.getElementById("fontSizeValue");
        const lineHeightValue = document.getElementById("lineHeightValue");
        const letterSpacingValue = document.getElementById("letterSpacingValue");
        const wordSpacingValue = document.getElementById("wordSpacingValue");
        // Update function
        function updateText() {
        // Font size
        textBox.style.fontSize = fontSize.value + "px";
        fontSizeValue.textContent = fontSize.value + "px";
        // Font weight
        textBox.style.fontWeight = fontWeight.value;
        // Line height
        textBox.style.lineHeight = lineHeight.value;
        lineHeightValue.textContent = lineHeight.value;
        // Letter spacing
        textBox.style.letterSpacing = letterSpacing.value + "px";
        letterSpacingValue.textContent = letterSpacing.value + "px";
        // Word spacing
        textBox.style.wordSpacing = wordSpacing.value + "px";
        wordSpacingValue.textContent = wordSpacing.value + "px";
        // Text alignment
        textBox.style.textAlign = textAlign.value;
        // Text transform
        textBox.style.textTransform = textTransform.value;
        // Font family
        textBox.style.fontFamily = fontFamily.value;
      }
      // Attach Listeners
      fontSize.addEventListener("input", updateText);
      fontWeight.addEventListener("change", updateText);
      lineHeight.addEventListener("input", updateText);
      letterSpacing.addEventListener("input", updateText);
      wordSpacing.addEventListener("input", updateText);
      textAlign.addEventListener("change", updateText);
      textTransform.addEventListener("change", updateText);
      fontFamily.addEventListener("change", updateText);
      // Initialize
      updateText();
    </script>
</body>
</html>
