<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h2>Counter</h2>
    <p id="count" style="font-size:40px;">0</p>
    <button onclick="increaseCount()">+</button>
    <button onclick="decreaseCount()">-</button>
    <button onclick="resetCount()">Reset</button>
    <button onclick="saveCount()">Save</button>
    <button onclick="loadCount()">Load</button> 
    <script src="script.js"></script>
    <script>
        //Declare the counter
        let count=0;
        // Load the counter when the page opens
        loadCount();
        // Function to display the counter
        function updateCount() {
            document.getElementById("count").innerHTML = count;
        }
        //Function to increase the counter 
        function increaseCount() {
            count++;
            updateCount();
        }
        // Function to decrease the counter
        function decreaseCount() {
            count--;
            updateCount();
        } 
        // Function to reset the counter
        function resetCount() {
            count = 0;
            updateCount();
        }
        // Function to save the counter
        function saveCount() {
            localStorage.setItem("count", count);
        }
        // Function to load the counter
        function loadCount() {
            let saved = localStorage.getItem("count");
            if (saved !== null) {
                count = Number(saved);
            }
            updateCount();
        }
    </script>
</body>
</html>
