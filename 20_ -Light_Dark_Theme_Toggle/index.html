<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="http://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body.dark { background: #222; color: white;}
    </style>
    <title>Light/Dark Theme Toggle</title>
</head>
<body>
    <h1><i class="fa-solid fa-moon"></i> Theme Toggle</h1>
    <button onclick="toggle()">Theme Toggle</button>    
    <script>
        let theme = localStorage.getItem("theme") || "light";
        if (theme === "dark") document.body.classList.add("dark");
        function toggle() {
            document.body.classList.toggle("dark");
            theme = document.body.classList.contains("dark") ? "dark" : "light";
            localStorage.setItem("theme", theme);
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
