<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* Reset default spacing */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Page title */
        .title {
            text-align: center;
            margin: 30px 0;
            font-size: 2rem;
        }
        /* Countdown layout */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 40px;
        }
        /* Each time box */
        .box {
          background: #333;
          color: white;
          padding: 20px 30px;
          border-radius: 10px;
          text-align: center;  
        }
        /* The numbers */
        .box span {
             font-size: 2.5rem;
             font-weight: bold;
        }
        /* Hidden class for message */
        .hidden {
            border: 3px solid #f00;
            display: none;
        }
        /* Finished message */
        #finishedMessage {
            text-align: center;
            margin-top: 40px;
            font-size: 2rem;
            color: #4caf50;
        }
    </style>
    <title>JavaScript Countdown Timer</title>
</head>
<body>
    <h1 class="title">Countdown Timer</h1>
    <!-- Countdown container -->
    <div class="countdown">
        <!-- Each time unit gets its own box -->
        <div class="box">
            <span id="days">0</span>
            <p>Days</p>
        </div>
        <div class="box">
            <span id="hours">0</span>
            <p>Hours</p>
        </div>
        <div class="box">
            <span id="minutes">0</span>
            <p>Minutes</p>
        </div>
        <div class="box">
            <span id="seconds">0</span>
            <p>Seconds</p>
        </div>
    </div>
    <!-- Message shown when countdown ends -->
    <h2 id="finishedMessage" class="hidden">Time's up!</h2>
    <script>
// 1. Set the target date and time for the countdown
// You can change this to any future date you want
const targetDate = new Date("December 31, 2026 23:59:59").getTime();
// 2. Select elements from the page
const daysEl = document.getElementById("days");
const hoursEl = document.getElementById("hours");
const minutesEl = document.getElementById("minutes");
const secondsEl = document.getElementById("seconds");
const finishedMessage = document.getElementById("finishedMessage");
// 3. Update the countdown every second
const timer = setInterval(() => {
  // Get the current time
  const now = new Date().getTime();
   // Calculate the difference between now and the target date
const distance = targetDate - now;
// If the countdown is finished...
if (distance <= 0) {
    clearInterval(timer); // Stop the timer
    finishedMessage.classList.remove("hidden"); // Show message
    return; // Exit the function
}
// 4. Time calculations
const days = Math.floor(distance / (1000 * 60 * 60 * 24));
const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
const seconds = Math.floor((distance % (1000 * 60)) / 1000);
 // 5. Update the HTML with the new values
daysEl.textContent = days;
hoursEl.textContent = hours;
minutesEl.textContent = minutes;
secondsEl.textContent = seconds;
}, 1000); // Runs every 1000ms (1 second)
    </script>
</body>
</html>
