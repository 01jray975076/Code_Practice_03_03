<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        body { text-align: center; font-family: Arial, Helvetica, sans-serif;}
        .grid { display: grid; grid-template-columns: repeat(2,120px); gap: 20px; margin: 40px auto;}
        .card { width: 120px; height: 120px; background: #444; color: white; font-size: 48px;
        display: flex; justify-content: center; align-items: center; cursor: pointer; }
    </style>
    <title>Memory Match</title>
</head>
<body>
    <h1><i class="fa-solid fa-brain"></i>Memory Match</h1>
    <div class="grid">
        <div class="card" data-val="🍎"></div>
        <div class="card" data-val="🍌"></div>
        <div class="card" data-val="🍎"></div>
        <div class="card" data-val="🍌"></div>
    </div>  
    <script src="script.js"></script>
    <script>
        let flipped = [];
        document.querySelectorAll(".card").forEach(card => {
            card.onclick = () => {
                if (flipped.length < 2 && !card.classList.contains("open")) {
                    card.innerText = card.dataset.val;
                    card.classList.add("open");
                    flipped.push(card);
                    if (flipped.length === 2) {
                        setTimeout(() => {
                            if (flipped[0].dataset.val !== flipped[1].dataset.val) {
                                flipped.forEach(c => { c.innerText = ""; c.classList.remove("open"); });
                            }
                            flipped = [];
                        }, 800);
                    }
                }
            };
        });
    </script>
</body>
</html>
