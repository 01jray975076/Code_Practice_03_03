<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <style>
body {
background: #0d1117;
color: #eee;
font-family: system-ui, sans-serif;
display: flex;
justify-content: center;
padding-top: 40px;
 margin: 0;
}
.container {
width: 360px;
background: #161b22;
padding: 24px;
border-radius: 12px;
box-shadow: 0 0 20px rgba(0,0,0,0.4);
}
h1 {
color: #58a6ff;
text-align: center;
}
.input-area {
display: flex;
gap: 10px;
margin-bottom: 20px;
}
input {
flex: 1px;
padding: 10px;
border-radius: 6px;
border: 1px solid #000;
background: #0d1117;
color: #eee;
}
button {
background: #238636;
border: none;
border-radius: 6px;
color: white;
padding: 10px 16px;
cursor: pointer;
}
button:hover {
background: #2ea043
}
ul {
list-style: none;
padding: 0;
margin: 0;
}
li {
background: #21262d;
padding: 12px;
border-radius: 6px;
margin-bottom: 10px;
display: flex;
justify-content: space-between;
align-items: center;
}
li.completed {
text-decoration: line-through;
opacity: 0.6;
}
.delete-btn {
background: #ff7b72;
border: none;
padding: 6px 10px;
border-radius: 6px;
cursor: pointer;
}
.delete-btn:hover {
background: #ff9b8e;
}
.code-output {
margin-top: 24px;
background: #0d1117;
border: 1px solid #30363d;
padding: 16px;
border-radius: 8px;
}
#codeBlock {
white-space: pre-wrap;
font-family: Consolas, monospace;
font-size: 14px;
color: #c9d1d9;
}
    </style>
    <title>To-Do App</title>
</head>
<body>
    <div class="container">
        <h1>To-Do App</h1>
        <div class="input-area">
        <input type="text" id="taskInput" placeholder="Add a new task ...">
        <button id="addBtn">Add</button>
        </div>
        <ul id="taskList"></ul>
        <div class="code-output">
            <h3>Action Code</h3>
            <pre id="codeBlock"></pre>
        </div>
    </div>  
    <script>
        const taskInput = document.getElementById("taskInput");
        const addBtn = document.getElementById("addBtn");
        const taskList = document.getElementById("taskList");
        const codeBlock = document.getElementById("codeBlock");
        // Update code output panel
        function updateCodeOutput(code) {
            codeBlock.textContent = code.trim();
        }
       // Add a new task
       addBtn.addEventListener("click", () => {
        const text = taskInput.value.trim();
        if (text === "") return;
        const li = document.createElement("li");
        li.innerHTML = `
        <span class="task-text">${text}</span>
        <button class="delete-btn">X</button>
        `;
        taskList.appendChild(li);
        taskInput.value = "";
        updateCodeOutput(`
        const li = document.createElement("li");
        li.innerHTML = "<span>${text}</span><button>X</button>";
        taskList.appendChild(li);
        `);
       });
       // Handle clicks on tasks (complete or delete)
       taskList.addEventListener("click", (e) => {
        const li = e.target.closest("li");
        // Delete task
        if (e.target.classList.contains("delete-btn")) {
            li.remove();
            updateCodeOutput(`li.remove()`);
            return;
        }
        // Toggle completed
        li.classList.toggle("completed");
        updateCodeOutput(`li.classList.toggle("completed")`);
       });
    </script>
</body>
</html>
