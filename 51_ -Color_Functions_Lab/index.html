<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        /* 
      Same 2-column layout as your other playgrounds:
      - Sidebar: controls
      - Preview: color box
    */
    body {
        margin: 0;
        font-family: system-ui, sans-serif;
        display: grid;
        grid-template-columns: 260px 1fr;
        height: 100vh;
        background: #f5f5f5;
    }
     /* Sidebar styling */
     .sidebar {
        background: #fff;
        border-right: 1px solid #ddd;
        padding: 20px;
        overflow-y: auto;
     }
     h2 {
         margin-top: 0;
         font-size: 18px;
     }
     .control-group {
        margin-bottom: 20px;
     }
     label {
           font-weight: bold;
           display: block;
           margin-bottom: 6px;
     } 
     input[type="text"],
     input[type="range"],
     select {
       width: 100%;
       padding: 6px;
       font-size: 14px;
       border-radius: 6px;
       border: 1px solid #ccc;
       box-sizing: border-box; 
     }
     .value {
        font-size: 13px;
        color: #444;
        margin-top: 4px;
     }
      /* Preview area */
     .preview {
        padding: 20px;
     } 
      /* 
      The color preview box.
      This is where all color functions apply.
    */
    .color-box { 
        width: 100%;
        height: 300px;
        border-radius: 10px;
        border: 1px solid #000;
        background: #f00;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        font-weight: bold;
        color: #fff;
        transition: background 0.2s ease; 
    }
    </style>
    <title>Color Functions Lab</title>
</head>
<body>
    <!-- Sidebar -->
     <div class="sidebar">
        <h2>Color Functions Lab</h2>
        <!-- HEX -->
        <div class="control-group">
            <label>HEX</label>
            <input type="text" id="hexInput" placeholder="#ff0000">
        </div>
        <!-- RGB -->
        <div class="control-group">
            <label>RGB</label>
            <input type="text" id="rgbInput" placeholder="rgb(255, 0, 0)">
        </div>
        <!-- RGBA-->
        <div class="control-group">
            <label>RGBA</label>
            <input type="text" id="rgbaInput" placeholder="rgb(255, 0, 0, 0.5)">
        </div>
        <!-- HSL-->
        <div class="control-group">
            <label>HSL</label>
            <input type="text" id="hslInput" placeholder="hsl(0, 100%, 50%)">
        </div>
        <!-- HSLA-->
        <div class="control-group">
            <label>HSLA</label>
            <input type="text" id="hslaInput" placeholder="hsla(0, 100%, 50%, 0.5)">
        </div>
        <!-- color-mix()-->
        <div class="control-group">
            <label>color-mix()</label>
            <input type="text" id="mixInput" placeholder="color-mix(in srgb, red 50%, blue)">
        </div>
        <!-- color-contrast()-->
        <div class="control-group">
            <label>color-contrast()</label>
            <input type="text" id="contrastInput" placeholder="color-contrast(white vs black, vs red)">
        </div>
         <!-- Dropdown to choose which color function to apply -->
          <div class="control-group">
            <label>Apply Color From</label>
            <select id="modeSelect">
                <option value="hex">HEX</option>
                <option value="rgb">RGB</option>
                <option value="rgba">RGBA</option>
                <option value="hsl">HSL</option>
                <option value="hsla">HSLA</option>
                <option value="mix">color-mix()</option>
                <option value="contrast">color-contrast()</option>
            </select>
          </div>
     </div>
     <!-- Preview -->
     <div class="preview">
        <h2>Color Preview</h2>
        <div class="color-box" id="colorBox">
            Color Preview
        </div>
     </div>
    <script>
        // Grab the preview box
        const colorBox = document.getElementById("colorBox");
        // Grab all inputs
        const hexInput = document.getElementById("hexInput");
        const rgbInput = document.getElementById("rgbInput");
        const rgbaInput = document.getElementById("rgbaInput");
        const hslInput = document.getElementById("hslInput");
        const hslaInput = document.getElementById("hslaInput");
        const mixInput = document.getElementById("mixInput");
        const contrastInput = document.getElementById("contrastInput");
        // Dropdown for selecting which color function to apply
        const modeSelect = document.getElementById("modeSelect");
        // Function to update the preview box
        function updateColor() {
            let color = "";
          // Determine which input to use
          switch (modeSelect.value) {
            case "hex":
                color = hexInput.value;
                break;
                case "rgb":
                color = rgbInput.value;
                break;
                case "rgba":
                color = rgbaInput.value;
                break; 
                case "hsl":
                color = hslInput.value;
                break;
                case "hsla":
                color = hslaInput.value;
                break;
                case "mix":
                color = mixInput.value;
                break;
                case "contrast":
                color = contrastInput.value;
                break;
          }
           /*
        Try applying the color.
        If the user types an invalid color, the browser will ignore it.
        We wrap in try/catch to avoid breaking the UI.
      */
     try {
        colorBox.style.background = color;
     } catch (e) {
        console.warn("Invalid color:", color);
     }
   }
   // Attach listeners to all inputs
hexInput.addEventListener("input", updateColor);
rgbInput.addEventListener("input", updateColor);
rgbaInput.addEventListener("input", updateColor);
hslInput.addEventListener("input", updateColor);
hslaInput.addEventListener("input", updateColor);
mixInput.addEventListener("input", updateColor);
contrastInput.addEventListener("input", updateColor);
modeSelect.addEventListener("change", updateColor);
// Initialize
updateColor();
    </script>
</body>
</html>
