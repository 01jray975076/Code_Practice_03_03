<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        body { font-family: Arial, sans-serif; padding: 40px; max-width: 600px; margin: auto; text-align: center; }
        #preview { width: 100%; height: 150px; border-radius: 10px; margin-bottom: 20px; display: flex; justify-content: center; align-items: center; font-size: 20px; color: #fff; font-weight: bold; }
        .row { margin: 20px 0; text-align: left; }
        input[type="range"] { width: 100%;}
        label { font-weight: bold; display: block; margin-bottom: 5px; }
    </style>
    <title>HSLA Color Mixer</title>
</head>
<body>
    <h1> <i class="fa-solid fa-swatchbook"></i> HSLA Color Mixer</h1>
    <p>Adjust Hue, Saturation, Lightness, and Alpha:</p>
    <div id="preview">hsla(10, 70%, 60%, 0.5)</div>
    <div class="row">
        <label>HUE: <span id="hVal">10</span></label>
        <input type="range" id="h" min="0" max="360" value="10">
    </div>
    <div class="row">
        <label>SATURATION: <span id="sVal">70</span>%</label>
        <input type="range" id="s" min="0" max="100" value="70">
    </div>
    <div class="row">
        <label>LIGHTNESS: <span id="lVal">60</span>%</label>
        <input type="range" id="l" min="0" max="100" value="60">
    </div>
    <div class="row">
        <label>ALPHA: <span id="aVal">0.5</span></label>
        <input type="range" id="a" min="0" max="1" step="0.01" value="0.5">
    </div>
    <script>
        const h = document.getElementById("h");
        const s = document.getElementById("s");
        const l = document.getElementById("l");
        const ah= document.getElementById("a");
        const rVal = document.getElementById("hVal");
        const sVal = document.getElementById("sVal");
        const lVal = document.getElementById("lVal");
        const aVal = document.getElementById("aVal");
        const preview = document.getElementById("preview");
        function update() {
            const hsla = `hsla(${h.value}, ${s.value}%, ${l.value}%, ${a.value})`;
            hVal.innerText = h.value;
            sVal.innerText = s.value;
            lVal.innerText = l.value;
            aVal.innerText = a.value;
            preview.style.background = hsla;
            preview.innerText = hsla;
        }
        h.oninput = s.oninput = l.oninput = a.oninput = update;
        update()        
    </script>
    <script src="script.js"></script>
</body>
</html>
